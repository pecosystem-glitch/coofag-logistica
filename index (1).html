<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CooFAG - Sistema de Camiones</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 450px;
            width: 100%;
            padding: 40px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-section h1 {
            color: #1e3c72;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .logo-section p {
            color: #666;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-button {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #999;
            transition: all 0.3s;
        }

        .tab-button.active {
            color: #1e3c72;
            border-bottom-color: #1e3c72;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #1e3c72;
            box-shadow: 0 0 5px rgba(30, 60, 114, 0.2);
        }

        .role-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .role-option {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            background: white;
            color: #333;
            font-weight: 500;
        }

        .role-option:hover {
            border-color: #1e3c72;
        }

        .role-option.selected {
            background: #1e3c72;
            color: white;
            border-color: #1e3c72;
        }

        button.submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button.submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(30, 60, 114, 0.3);
        }

        button.submit-btn:active {
            transform: translateY(0);
        }

        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert.error {
            background: #fee;
            color: #c00;
            border: 1px solid #f99;
        }

        .alert.success {
            background: #efe;
            color: #0a0;
            border: 1px solid #9f9;
        }

        .loading {
            display: none;
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1e3c72;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <h1>🚚 CooFAG</h1>
            <p>Sistema de Gestión de Camiones</p>
        </div>

        <div class="tabs">
            <button class="tab-button active" onclick="switchTab('login')">Ingresar</button>
            <button class="tab-button" onclick="switchTab('signup')">Registrarse</button>
        </div>

        <!-- TAB: LOGIN -->
        <div id="login" class="tab-content active">
            <div class="alert" id="loginAlert"></div>
            
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" placeholder="tu@email.com">
            </div>

            <div class="form-group">
                <label for="loginPassword">Contraseña</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>

            <div class="loading" id="loginLoading">
                <div class="spinner"></div>
                Ingresando...
            </div>

            <button class="submit-btn" onclick="handleLogin()" id="loginBtn">Ingresar</button>
        </div>

        <!-- TAB: SIGNUP -->
        <div id="signup" class="tab-content">
            <div class="alert" id="signupAlert"></div>

            <label>¿Cuál es tu rol?</label>
            <div class="role-selector">
                <div class="role-option" onclick="selectRole('productor')">
                    👨‍🌾 Productor
                </div>
                <div class="role-option" onclick="selectRole('operador')">
                    📊 Operador
                </div>
            </div>

            <div class="form-group">
                <label for="signupName">Nombre completo</label>
                <input type="text" id="signupName" placeholder="Juan Pérez">
            </div>

            <div class="form-group">
                <label for="signupEmail">Email</label>
                <input type="email" id="signupEmail" placeholder="tu@email.com">
            </div>

            <div class="form-group">
                <label for="signupPassword">Contraseña</label>
                <input type="password" id="signupPassword" placeholder="••••••••">
            </div>

            <div class="form-group">
                <label for="signupPasswordConfirm">Confirmar contraseña</label>
                <input type="password" id="signupPasswordConfirm" placeholder="••••••••">
            </div>

            <div class="loading" id="signupLoading">
                <div class="spinner"></div>
                Registrando...
            </div>

            <button class="submit-btn" onclick="handleSignup()" id="signupBtn">Registrarse</button>
        </div>
    </div>

    <script>
        // Configuración de Supabase
        const SUPABASE_URL = 'https://wtwlcnasknxqnfvhlwyd.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_FoFFZ7YbpkIqaMCjLBKcLQ_G6fzNbX2';
        
        let supabase = null;
        let selectedRole = null;

        // Inicializar Supabase cuando el documento esté listo
        if (window.supabase) {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }

        // Cambiar entre tabs
        function switchTab(tabName) {
            // Remover clases activas de todos los tabs
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            
            // Activar el tab seleccionado
            const tabElement = document.getElementById(tabName);
            if (tabElement) {
                tabElement.classList.add('active');
            }
            
            // Activar el botón correspondiente
            const buttons = document.querySelectorAll('.tab-button');
            buttons.forEach(btn => {
                if (btn.textContent.toLowerCase().includes(tabName === 'login' ? 'ingresar' : 'registr')) {
                    btn.classList.add('active');
                }
            });

            // Limpiar alertas
            document.getElementById('loginAlert').classList.remove('show');
            document.getElementById('signupAlert').classList.remove('show');
        }

        // Seleccionar rol
        function selectRole(role) {
            selectedRole = role;
            document.querySelectorAll('.role-option').forEach(el => el.classList.remove('selected'));
            event.target.closest('.role-option').classList.add('selected');
        }

        // Mostrar alerta
        function showAlert(elementId, message, type) {
            const alert = document.getElementById(elementId);
            alert.textContent = message;
            alert.className = `alert show ${type}`;
        }

        // LOGIN
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            const loading = document.getElementById('loginLoading');

            if (!email || !password) {
                showAlert('loginAlert', 'Por favor completa email y contraseña', 'error');
                return;
            }

            btn.style.display = 'none';
            loading.style.display = 'block';

            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                
                if (error) {
                    showAlert('loginAlert', `Error: ${error.message}`, 'error');
                    btn.style.display = 'block';
                    loading.style.display = 'none';
                    return;
                }

                // Obtener rol del usuario
                const { data: userData, error: roleError } = await supabase
                    .from('usuarios')
                    .select('rol')
                    .eq('email', email)
                    .single();

                if (roleError || !userData) {
                    showAlert('loginAlert', 'Error obteniendo información del usuario', 'error');
                    btn.style.display = 'block';
                    loading.style.display = 'none';
                    return;
                }

                // Redirigir según rol
                const rol = userData.rol;
                if (rol === 'operador') {
                    window.location.href = 'panel-operador.html';
                } else if (rol === 'productor') {
                    window.location.href = 'app-productor.html';
                } else {
                    showAlert('loginAlert', 'Rol no reconocido', 'error');
                    btn.style.display = 'block';
                    loading.style.display = 'none';
                }

            } catch (err) {
                showAlert('loginAlert', `Error: ${err.message}`, 'error');
                btn.style.display = 'block';
                loading.style.display = 'none';
            }
        }

        // SIGNUP
        async function handleSignup() {
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const passwordConfirm = document.getElementById('signupPasswordConfirm').value;
            const btn = document.getElementById('signupBtn');
            const loading = document.getElementById('signupLoading');

            if (!selectedRole) {
                showAlert('signupAlert', 'Por favor selecciona tu rol', 'error');
                return;
            }

            if (!name || !email || !password) {
                showAlert('signupAlert', 'Por favor completa todos los campos', 'error');
                return;
            }

            if (password !== passwordConfirm) {
                showAlert('signupAlert', 'Las contraseñas no coinciden', 'error');
                return;
            }

            if (password.length < 6) {
                showAlert('signupAlert', 'La contraseña debe tener al menos 6 caracteres', 'error');
                return;
            }

            btn.style.display = 'none';
            loading.style.display = 'block';

            try {
                // 1. Crear usuario en Supabase Auth
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: email,
                    password: password
                });

                if (authError) {
                    showAlert('signupAlert', `Error: ${authError.message}`, 'error');
                    btn.style.display = 'block';
                    loading.style.display = 'none';
                    return;
                }

                // 2. Guardar usuario en tabla usuarios
                const { error: userError } = await supabase
                    .from('usuarios')
                    .insert([
                        {
                            email: email,
                            rol: selectedRole === 'productor' ? 'ROL_PRODUCTOR' : 'ROL_OPERADOR'
                        }
                    ]);

                if (userError) {
                    showAlert('signupAlert', `Error guardando usuario: ${userError.message}`, 'error');
                    btn.style.display = 'block';
                    loading.style.display = 'none';
                    return;
                }

                // 3. Crear registro en tabla correspondiente (productor/operador)
                const userId = authData.user.id;

                if (selectedRole === 'productor') {
                    const { error: prodError } = await supabase
                        .from('productores')
                        .insert([
                            {
                                usuario_id: userId,
                                nombre: name,
                                email: email
                            }
                        ]);

                    if (prodError) {
                        showAlert('signupAlert', `Error: ${prodError.message}`, 'error');
                        btn.style.display = 'block';
                        loading.style.display = 'none';
                        return;
                    }
                } else if (selectedRole === 'operador') {
                    const { error: opError } = await supabase
                        .from('operadores')
                        .insert([
                            {
                                usuario_id: userId,
                                nombre: name,
                                email: email
                            }
                        ]);

                    if (opError) {
                        showAlert('signupAlert', `Error: ${opError.message}`, 'error');
                        btn.style.display = 'block';
                        loading.style.display = 'none';
                        return;
                    }
                }

                showAlert('signupAlert', '¡Registrado! Por favor confirma tu email e inicia sesión.', 'success');
                
                setTimeout(() => {
                    document.getElementById('loginEmail').value = email;
                    switchTab('login');
                    btn.style.display = 'block';
                    loading.style.display = 'none';
                }, 2000);

            } catch (err) {
                showAlert('signupAlert', `Error: ${err.message}`, 'error');
                btn.style.display = 'block';
                loading.style.display = 'none';
            }
        }

        // Verificar si ya hay sesión activa
        window.addEventListener('load', async () => {
            const { data: session, error } = await supabase.auth.getSession();
            
            if (session && session.user) {
                // Ya hay sesión activa, redirigir
                const { data: userData } = await supabase
                    .from('usuarios')
                    .select('rol')
                    .eq('email', session.user.email)
                    .single();

                if (userData) {
                    if (userData.rol === 'ROL_OPERADOR') {
                        window.location.href = 'panel-operador.html';
                    } else if (userData.rol === 'ROL_PRODUCTOR') {
                        window.location.href = 'app-productor.html';
                    }
                }
            }
        });
    </script>
</body>
</html>
